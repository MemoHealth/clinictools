  * { -webkit-tap-highlight-color: transparent; }

  .pulse-ring {
    animation: pulse-ring 1.5s cubic-bezier(0.215,0.61,0.355,1) infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 1; }
    60%  { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  .atom-enter {
    animation: atom-in 350ms cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes atom-in {
    from { opacity:0; transform: translateY(-12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .slide-up {
    animation: slide-up 300ms cubic-bezier(0.4,0,0.2,1) both;
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .fade-in {
    animation: fade-in 200ms ease both;
  }
  @keyframes fade-in {
    from { opacity:0; }
    to   { opacity:1; }
  }

function Badge({type, small}) {
  const c = assessCfg[type] || assessCfg.notera;
  return (
    <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold tracking-wide ${c.bg} ${c.text} ${small?'text-[10px]':''}`}>
      {c.label}
    </span>
  );
}

function CoverageBar({pct, label, compact}) {
  const w = Math.round(pct * 100);
  const color = pct >= 0.9 ? 'bg-green-m' : pct >= 0.7 ? 'bg-teal-bright' : 'bg-amber';
  if (compact) return (
    <div className="flex items-center gap-2">
      <div className="flex-1 h-1 bg-navy-light rounded-full overflow-hidden">
        <div className={`h-full ${color} rounded-full transition-all duration-500`} style={{width:`${w}%`}}/>
      </div>
      <span className="font-mono text-[11px] text-ts">{w}%</span>
    </div>
  );
  return (
    <div>
      <div className="flex justify-between items-center mb-1.5">
        <span className="text-xs font-semibold tracking-widest text-ts uppercase">{label || 'Täckning'}</span>
        <span className="font-mono text-xs text-teal-bright">{w}%</span>
      </div>
      <div className="h-1.5 bg-navy-light rounded-full overflow-hidden">
        <div className={`h-full ${color} rounded-full transition-all duration-500`} style={{width:`${w}%`}}/>
      </div>
    </div>
  );
}

function AtomCard({atom, onClick, isNew}) {
  const c = assessCfg[atom.assessment] || assessCfg.notera;
  return (
    <div
      onClick={onClick}
      className={`relative border-l-4 ${c.border} bg-navy-mid rounded-lg p-3 cursor-pointer hover:bg-navy-light/60 transition-colors ${isNew ? 'atom-enter' : ''}`}
    >
      <div className="flex items-start gap-2 mb-1.5">
        <div className="flex gap-1 mt-0.5">
          {atom.sources.map(s => {
            const SIcon = sourceIcons[s];
            return SIcon ? <span key={s} className="text-ts"><SIcon/></span> : null;
          })}
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap mb-1">
            <Badge type={atom.assessment} small/>
            <span className="text-xs text-td">{atom.room}</span>
          </div>
          <p className="text-sm text-tp/90 leading-snug font-serif line-clamp-2">{atom.observation}</p>
        </div>
        <Ic.ChevronR/>
      </div>
      <div className="flex items-center gap-3 ml-6 mt-1">
        {atom.photoCount > 0 && (
          <span className="flex items-center gap-1 text-xs text-td"><Ic.Camera/>{atom.photoCount} foto</span>
        )}
        {atom.measurement && (
          <span className="flex items-center gap-1 text-xs text-td"><Ic.Ruler/>{atom.measurement.value}{atom.measurement.unit}</span>
        )}
        <span className="font-mono text-xs text-td ml-auto">{atom.timestamp}</span>
      </div>
    </div>
  );
}

function Toast({msg, onDone}) {
  useEffect(() => {
    const t = setTimeout(onDone, 2500);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className="fixed bottom-24 right-4 z-50 fade-in bg-navy-mid border border-navy-light text-tp px-4 py-2.5 rounded-xl shadow-xl text-sm font-medium">
      {msg}

  );
}

// SCREEN: ACTIVE INSPECTION (HERO)
// ─────────────────────────────────────────────────────────────────
function ActiveInspectionScreen({onNav, onAtomDetail}) {
  const [seconds, setSeconds] = useState(2057);
  const [room, setRoom] = useState('badrum_ov');
  const [showRoomPicker, setShowRoomPicker] = useState(false);
  const [showFinish, setShowFinish] = useState(false);
  const [showMeasure, setShowMeasure] = useState(false);
  const [atoms, setAtoms] = useState(ATOMS.slice(0,4));
  const [newAtomId, setNewAtomId] = useState(null);
  const [sttText, setSttText] = useState('');
  const [sttLineIdx, setSttLineIdx] = useState(0);
  const [sttWordIdx, setSttWordIdx] = useState(0);

  // Timer
  useEffect(() => {
    const id = setInterval(() => setSeconds(s => s+1), 1000);
    return () => clearInterval(id);
  }, []);

  // STT simulation
  useEffect(() => {
    const words = STT_LINES[sttLineIdx % STT_LINES.length].split(' ');
    if (sttWordIdx >= words.length) {
      const t = setTimeout(() => {
        setSttWordIdx(0);
        setSttLineIdx(i => i+1);
        setSttText('');
      }, 2000);
      return () => clearTimeout(t);
    }
    const t = setTimeout(() => {
      setSttText(words.slice(0, sttWordIdx+1).join(' '));
      setSttWordIdx(w => w+1);
    }, 380);
    return () => clearTimeout(t);
  }, [sttWordIdx, sttLineIdx]);

  const activeRoom = ROOMS.find(r => r.id === room) || ROOMS[0];
  const roomAtoms = atoms.filter(a => a.roomId === room);

  function handleFoto() {
    const newAtom = {
      id: `A-0${atoms.length + 30}`,
      roomId: room,
      room: activeRoom.name,
      assessment: 'notera',
      observation: 'Foto taget. Inväntar verbal bedömning…',
      timestamp: fmtTime(seconds),
      photoCount: 1,
      sources: ['foto'],
      isTemp: true,
    };
    setAtoms(prev => [newAtom, ...prev]);
    setNewAtomId(newAtom.id);
    setTimeout(() => setNewAtomId(null), 600);
  }

  const roomItems = [
    {id:'entre',n:'Entré'},{id:'kok',n:'Kök'},{id:'vardagsrum',n:'Vardagsrum'},
    {id:'badrum_ov',n:'Badrum ÖV'},{id:'badrum_nv',n:'Badrum NV'},
    {id:'sovrum_1',n:'Sovrum 1'},{id:'sovrum_2',n:'Sovrum 2'},
    {id:'vind',n:'Vind'},{id:'yttertak',n:'Yttertak'},{id:'fasad',n:'Fasad'},
  ];

  const finishRooms = [
    {name:'Entré',cov:1.0},{name:'Kök',cov:1.0},{name:'Vardagsrum',cov:0.88},
    {name:'Badrum ÖV',cov:0.94},{name:'Vind',cov:0.71,gaps:['Brandvarnare','Isolering','Dagvatten']},
    {name:'Yttertak',cov:1.0},{name:'Fasad',cov:1.0},
  ];

  return (
    <div className="flex flex-col h-full overflow-hidden" style={{background:'#080E14'}}>
      {/* REC header */}
      <div className="flex items-center gap-3 px-4 pt-10 pb-2.5 flex-shrink-0">
        <span className="flex items-center gap-1.5 bg-red-m/15 border border-red-m/30 rounded-full px-2.5 py-1">
          <span className="relative flex h-2 w-2">
            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-m opacity-75"></span>
            <span className="relative inline-flex rounded-full h-2 w-2 bg-red-m"></span>
          </span>
          <span className="text-xs font-bold text-red-m tracking-wider">REC</span>
        </span>
        <span className="text-sm font-medium text-tp/80">Storgatan 12</span>
        <span className="font-mono text-xs text-ts ml-auto">{fmtTime(seconds)}</span>
      </div>

      {/* Room selector */}
      <div className="px-4 pb-2 flex-shrink-0">
        <button
          onClick={() => setShowRoomPicker(p => !p)}
          className="flex items-center gap-2 bg-navy-mid border border-navy-light rounded-lg px-3 py-2 text-sm text-tp hover:border-teal/30 transition-colors"
        >
          <span className="text-ts text-xs uppercase tracking-wider font-semibold">Rum:</span>
          <span className="font-medium flex-1">{activeRoom.name}</span>
          <Ic.ChevronD/>
        </button>
        {showRoomPicker && (
          <div className="absolute z-40 left-4 right-4 mt-1 bg-navy-mid border border-navy-light rounded-xl overflow-hidden shadow-2xl">
            {roomItems.map(r => (
              <button
                key={r.id}
                onClick={() => { setRoom(r.id); setShowRoomPicker(false); }}
                className={`w-full text-left px-4 py-2.5 text-sm transition-colors ${r.id === room ? 'bg-teal-dim text-teal-bright font-semibold' : 'text-tp hover:bg-navy-light'}`}
              >
                {r.n}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Coverage */}
      <div className="px-4 pb-2 flex-shrink-0">
        <CoverageBar pct={activeRoom.coverage} compact/>
      </div>

      {/* Atom feed */}
      <div className="flex-1 overflow-y-auto px-4 pb-2">
        <div className="text-[11px] font-bold tracking-widest text-td uppercase mb-2">{activeRoom.name.toUpperCase()} · {roomAtoms.length} observationer</div>
        <div className="space-y-2">
          {roomAtoms.map(a => (
            <AtomCard key={a.id} atom={a} isNew={a.id === newAtomId} onClick={() => onAtomDetail(a)}/>
          ))}
          {roomAtoms.length === 0 && (
            <div className="text-center py-8 text-td text-sm">Inga observationer ännu i detta rum.</div>
          )}
        </div>
      </div>

      {/* Live STT */}
      <div className="flex-shrink-0 px-4 py-2 border-t border-navy-light/50">
        <div className="flex items-start gap-2">
          <span className="text-teal-bright mt-0.5"><Ic.Mic/></span>
          <p className="text-sm text-ts/90 leading-snug min-h-[1.25rem]">
            {sttText}<span className="inline-block w-0.5 h-3.5 bg-teal-bright align-middle ml-0.5 animate-pulse"/>
          </p>
        </div>
      </div>

      {/* Actions */}
      <div className="flex-shrink-0 px-4 pb-8 pt-2 flex gap-2.5">
        <button onClick={handleFoto} className="flex-1 flex flex-col items-center gap-1 bg-navy-mid border border-navy-light py-3 rounded-xl text-ts hover:text-teal-bright hover:border-teal/40 transition-colors">
          <Ic.Camera/>
          <span className="text-[11px] font-semibold tracking-wide">FOTO</span>
        </button>
        <button onClick={() => setShowMeasure(true)} className="flex-1 flex flex-col items-center gap-1 bg-navy-mid border border-navy-light py-3 rounded-xl text-ts hover:text-teal-bright hover:border-teal/40 transition-colors">
          <Ic.Ruler/>
          <span className="text-[11px] font-semibold tracking-wide">MÄT</span>
        </button>
        <button onClick={() => setShowFinish(true)} className="flex-1 flex flex-col items-center gap-1 bg-teal-dim border border-teal/40 py-3 rounded-xl text-teal-bright hover:bg-teal/20 transition-colors">
          <Ic.Flag/>
          <span className="text-[11px] font-semibold tracking-wide">KLAR</span>
        </button>
      </div>

      {/* Measure modal */}
      {showMeasure && (
        <MeasureModal
          onClose={() => setShowMeasure(false)}
          onSave={m => {
            const newAtom = {
              id: `A-0${atoms.length + 30}`,
              roomId: room, room: activeRoom.name,
              assessment: m.value > 18 ? 'anmarkning' : 'ok',
              observation: `${m.label}: ${m.value} ${m.unit} uppmätt med ${m.instrument}.${m.value > 18 ? ' Överstiger gränsvärde.' : ' Inom normalt intervall.'}`,
              timestamp: fmtTime(seconds),
              photoCount: 0,
              measurement: m,
              sources: ['matvarde'],
            };
            setAtoms(prev => [newAtom, ...prev]);
            setNewAtomId(newAtom.id);
            setTimeout(() => setNewAtomId(null), 600);
            setShowMeasure(false);
          }}
        />
      )}

      {/* Finish panel */}
      {showFinish && (
        <div className="absolute inset-0 z-50 flex flex-col justify-end bg-navy/80 backdrop-blur-sm" onClick={() => setShowFinish(false)}>
          <div className="slide-up bg-navy-mid border-t border-navy-light rounded-t-2xl p-5" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-bold text-lg text-tp font-serif">Klar att lämna?</h3>
              <button onClick={() => setShowFinish(false)} className="text-td hover:text-ts"><Ic.X/></button>
            </div>
            <div className="space-y-2 mb-5">
              {finishRooms.map(r => (
                <div key={r.name} className="flex items-start gap-3">
                  {r.cov === 1.0
                    ? <span className="text-green-m mt-0.5"><Ic.Check/></span>
                    : <span className="text-amber mt-0.5"><Ic.Alert/></span>
                  }
                  <div className="flex-1">
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-medium text-tp">{r.name}</span>
                      <span className={`ml-auto font-mono text-xs ${r.cov === 1 ? 'text-green-m' : 'text-amber'}`}>{Math.round(r.cov*100)}%</span>
                    </div>
                    {r.gaps && <div className="text-xs text-td mt-0.5">{r.gaps.join(' · ')}</div>}
                  </div>
                </div>
              ))}
            </div>
            <div className="text-xs text-ts mb-4 font-mono">Totalt: 47 av 52 checkpoints</div>
            <div className="flex gap-3">
              <button onClick={() => setShowFinish(false)} className="flex-1 bg-navy border border-navy-light text-ts py-3 rounded-xl font-semibold text-sm hover:text-tp transition-colors">
                Gå tillbaka
              </button>
              <button onClick={() => { setShowFinish(false); onNav('report'); }} className="flex-1 bg-teal text-tp py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 hover:bg-teal/90">
                Generera <Ic.ChevronR/>
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// SCREEN: ATOM LIST
// ─────────────────────────────────────────────────────────────────
function AtomListScreen({onAtomDetail}) {
  const [filter, setFilter] = useState('alla');
  const [search, setSearch] = useState('');
  const tabs = ['alla','anmarkning','risk','ok','notera'];
  const tabLabel = {alla:'Alla',anmarkning:'Anmärkning',risk:'Risk',ok:'OK',notera:'Notera'};

  const visible = ATOMS.filter(a => {
    const matchFilter = filter === 'alla' || a.assessment === filter;
    const matchSearch = !search || a.observation.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const grouped = {};
  visible.forEach(a => {
    if (!grouped[a.room]) grouped[a.room] = [];
    grouped[a.room].push(a);
  });

  return (
    <div className="flex flex-col h-full overflow-hidden">
      <div className="px-4 pt-10 pb-3 flex-shrink-0">
        <h2 className="font-bold text-xl text-tp font-serif tracking-tight">Evidenslager</h2>
        <div className="text-xs text-ts mt-0.5">{visible.length} av {ATOMS.length} atomer · Storgatan 12 · 09:14–pågående</div>
      </div>

      {/* Search */}
      <div className="px-4 pb-2 flex-shrink-0">
        <div className="flex items-center gap-2 bg-navy-mid border border-navy-light rounded-lg px-3 py-2">
          <Ic.Search/>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Sök i observationer…"
            className="flex-1 bg-transparent text-sm text-tp focus:outline-none"
          />
        </div>
      </div>

      {/* Filter tabs */}
      <div className="flex gap-1 px-4 pb-3 flex-shrink-0 overflow-x-auto">
        {tabs.map(t => (
          <button
            key={t}
            onClick={() => setFilter(t)}
            className={`flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${filter === t ? 'bg-teal text-tp' : 'bg-navy-mid text-ts hover:text-tp'}`}
          >
            {tabLabel[t]}
          </button>
        ))}
      </div>

      {/* List */}
      <div className="flex-1 overflow-y-auto px-4 pb-24 space-y-4">
        {Object.entries(grouped).map(([room, atoms]) => (
          <div key={room}>
            <div className="text-[11px] font-bold tracking-widest text-td uppercase mb-2">{room.toUpperCase()}</div>
            <div className="space-y-2">
              {atoms.map(a => <AtomCard key={a.id} atom={a} onClick={() => onAtomDetail(a)}/>)}
            </div>
          </div>
        ))}
        {visible.length === 0 && (
          <div className="text-center py-12 text-td text-sm">Inga atomer matchar filtret.</div>
        )}
      </div>
    </div>
  );
}

                <div className="text-xs text-td mt-1">{atom.measurement.label}</div>

                <div className="text-xs text-ts">{atom.measurement.instrument}</div>

  return (
    <div className="flex flex-col h-full overflow-y-auto pb-24">
      <div className="px-4 pt-10 pb-3">
        <h2 className="font-bold text-xl text-tp font-serif tracking-tight">Fastighetsminne</h2>
        <div className="text-xs text-ts mt-0.5">Storgatan 12 · Stockholm Vasastaden 14:7 · Villa 1938 · 154 m²</div>
      </div>

      {/* Search */}
      <div className="px-4 pb-4">
        <div className="flex items-center gap-2 bg-navy-mid border border-navy-light rounded-lg px-3 py-2.5">
          <span className="text-td"><Ic.Search/></span>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Sök i all historik… t.ex. "fukt""
            className="flex-1 bg-transparent text-sm text-tp focus:outline-none"
          />
        </div>
        {searchAtoms.length > 0 && (
          <div className="mt-2">
            <div className="text-[11px] font-bold tracking-widest text-ts uppercase mb-2">Sökresultat: "{search}" · {searchAtoms.length} träffar</div>
            <div className="space-y-2">
              {searchAtoms.map(a => <AtomCard key={a.id} atom={a} onClick={()=>{}}/>)}
            </div>
          </div>
        )}
      </div>

      {/* Timeline */}
      <div className="px-4">
        <div className="text-[11px] font-bold tracking-widest text-ts uppercase mb-3">Tidslinje</div>
        <div className="relative">
          <div className="absolute left-2.5 top-2 bottom-2 w-0.5 bg-navy-light"/>
          <div className="space-y-6">
            {HISTORY.map((h, i) => (
              <div key={h.year} className="flex gap-4 relative">
                <div className={`w-5 h-5 rounded-full border-2 flex-shrink-0 relative z-10 mt-0.5 ${h.status === 'active' ? 'bg-teal-bright border-teal-bright' : 'bg-navy-mid border-teal'}`}/>
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span className="font-bold text-tp font-serif">{h.year}</span>
                    {h.status === 'active' && (
                      <span className="text-[10px] font-bold text-teal-bright bg-teal-dim px-1.5 py-0.5 rounded">PÅGÅENDE</span>

                  <div className="text-sm text-ts">{h.type}</div>
                  <div className="text-xs text-td mt-0.5">{h.inspector}</div>
                  {h.note && <div className="text-xs text-green-m mt-0.5">{h.note}</div>}
                  <div className="flex items-center gap-3 mt-2">
                    <span className="text-xs font-mono text-ts">{h.anm} anmärkningar</span>
                    <button className="text-xs text-teal-bright font-semibold hover:underline">Visa rapport</button>

            ))}

        </div>

      {/* Trends */}
      <div className="px-4 mt-6">
        <div className="text-[11px] font-bold tracking-widest text-ts uppercase mb-3">Trender per kategori</div>
        <div className="space-y-3">
          {TRENDS.map(t => (
            <div key={t.cat} className="bg-navy-mid border border-navy-light rounded-xl p-4">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-lg">{t.emoji}</span>
                <span className="font-semibold text-sm text-tp">{t.cat}</span>

                  <span className="ml-auto flex items-center gap-1 text-amber text-xs font-semibold"><Ic.TrendUp/> Ökande</span>
                )}

                {t.data.map(d => {
                  const max = Math.max(...t.data.map(x => x.n)) || 1;

// ─────────────────────────────────────────────────────────────────
// MEASURE MODAL
// ─────────────────────────────────────────────────────────────────
function MeasureModal({onClose, onSave}) {
  const [value, setValue] = useState('');
  const [unitIdx, setUnitIdx] = useState(0);
  const [labelIdx, setLabelIdx] = useState(0);
  const [instrIdx, setInstrIdx] = useState(0);

  const units = ['%','°C','mm','l/s','ppm','Pa'];
  const labels = ['Fuktkvot','Temperatur','Tjocklek','Luftflöde','VOC','Lufttryck'];
  const instruments = ['Tramex MRH3','Testo 405i','Protimeter BLD5800','Testo 605-H1','Lasermätare'];

  function save() {
    if (!value) return;
    onSave({value: parseFloat(value), unit: units[unitIdx], label: labels[labelIdx], instrument: instruments[instrIdx]});
  }

  return (
    <div className="absolute inset-0 z-50 flex flex-col justify-end" style={{background:'rgba(8,14,20,0.85)'}}>
      <div className="slide-up bg-navy-mid border-t border-navy-light rounded-t-2xl px-5 pt-5 pb-8">
        <div className="flex items-center justify-between mb-5">
          <h3 className="font-bold text-lg text-tp font-serif">Mätvärde</h3>
          <button onClick={onClose} className="text-td hover:text-ts p-1"><Ic.X/></button>
        </div>

        {/* Value input */}
        <div className="mb-4">
          <label className="text-[11px] font-bold tracking-widest text-ts uppercase block mb-1.5">Värde</label>
          <div className="flex gap-2">
            <input
              type="number"
              value={value}
              onChange={e => setValue(e.target.value)}
              placeholder="0"
              className="flex-1 bg-navy border border-navy-light text-tp font-mono text-2xl rounded-xl px-4 py-3 focus:outline-none focus:border-teal/60 text-center"
              autoFocus
            />
            <div className="flex flex-col gap-1">
              {units.map((u,i) => (
                <button key={u} onClick={() => setUnitIdx(i)}
                  className={`px-3 py-1 rounded-lg text-xs font-mono font-semibold transition-colors ${i === unitIdx ? 'bg-teal text-tp' : 'bg-navy border border-navy-light text-td'}`}>
                  {u}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Label */}
        <div className="mb-4">
          <label className="text-[11px] font-bold tracking-widest text-ts uppercase block mb-1.5">Kategori</label>
          <div className="flex flex-wrap gap-1.5">
            {labels.map((l,i) => (
              <button key={l} onClick={() => setLabelIdx(i)}
                className={`px-2.5 py-1 rounded-lg text-xs font-semibold transition-colors ${i === labelIdx ? 'bg-teal-dim border border-teal text-teal-bright' : 'bg-navy border border-navy-light text-td'}`}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {/* Instrument */}
        <div className="mb-5">
          <label className="text-[11px] font-bold tracking-widest text-ts uppercase block mb-1.5">Instrument</label>
          <div className="flex flex-wrap gap-1.5">
            {instruments.map((inst,i) => (
              <button key={inst} onClick={() => setInstrIdx(i)}
                className={`px-2.5 py-1 rounded-lg text-xs font-semibold transition-colors ${i === instrIdx ? 'bg-teal-dim border border-teal text-teal-bright' : 'bg-navy border border-navy-light text-td'}`}>
                {inst}
              </button>
            ))}
          </div>
        </div>

        <button
          onClick={save}
          disabled={!value}
          className="w-full bg-teal disabled:opacity-40 text-tp py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-teal/90 transition-colors"
        >
          <Ic.Check/> Spara mätvärde
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// BOTTOM NAV
// ─────────────────────────────────────────────────────────────────
function BottomNav({active, onNav, hasActive, atomCount}) {
  const tabs = [
    {id:'home',   label:'Hem',      Icon:Ic.Home},
    {id:'active', label:'Aktiv',    Icon:Ic.Zap},
    {id:'atoms',  label:'Atomer',   Icon:Ic.Layers},
    {id:'report', label:'Rapport',  Icon:Ic.File},
    {id:'history',label:'Historik', Icon:Ic.Clock},
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 z-30 bg-navy-mid border-t border-navy-light" style={{paddingBottom:'env(safe-area-inset-bottom)'}}>
      <div className="flex">
        {tabs.map(t => {
          const isActive = active === t.id || (t.id === 'active' && ['atom-detail'].includes(active));
          return (
            <button
              key={t.id}
              onClick={() => onNav(t.id)}
              className={`flex-1 flex flex-col items-center gap-1 py-2.5 relative transition-colors ${isActive ? 'text-teal-bright' : 'text-td hover:text-ts'}`}
            >
              <div className="relative">
                <t.Icon/>
                {t.id === 'active' && hasActive && (
                  <span className="absolute -top-1 -right-1.5 w-2 h-2 rounded-full bg-red-m border border-navy-mid">
                    <span className="absolute inset-0 animate-ping rounded-full bg-red-m opacity-75"/>
                  </span>
                )}
                {t.id === 'atoms' && atomCount > 0 && (
                  <span className="absolute -top-1 -right-2 min-w-[14px] h-3.5 bg-teal text-[9px] font-bold text-tp rounded-full flex items-center justify-center px-0.5">
                    {atomCount}
                  </span>
                )}
              </div>
              <span className={`text-[10px] font-semibold tracking-wide ${isActive ? 'text-teal-bright' : ''}`}>{t.label}</span>
              {isActive && <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-0.5 bg-teal-bright rounded-full"/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────────────────────────
function App() {
  const [navStack, setNavStack] = useState(['home']);
  const view = navStack[navStack.length - 1];
  const prevView = navStack.length > 1 ? navStack[navStack.length - 2] : null;

  const [selectedAtom, setSelectedAtom] = useState(null);
  const [toast, setToastMsg] = useState(null);

  function setToast(msg) { setToastMsg(msg); }

  // Tab bar navigation resets the stack to a single frame
  function handleNav(v) {
    setNavStack([v]);
  }

  // Push a new view onto the stack (drills in)
  function pushView(v) {
    setNavStack(prev => [...prev, v]);
  }

  // Pop back to previous view
  function popView() {
    setNavStack(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
  }

  function handleAtomDetail(atom) {
    setSelectedAtom(atom);
    pushView('atom-detail');
  }

  const rootView = navStack[0];
  const showNav = rootView !== 'new';

  return (
    <div className="fixed inset-0 bg-navy font-sans text-tp overflow-hidden">
      <div className="h-full relative">
        {view === 'home'       && <HomeScreen onNav={handleNav} setToast={setToast}/>}
        {view === 'new'        && <NewInspectionFlow onNav={handleNav}/>}
        {view === 'active'     && <ActiveInspectionScreen onNav={handleNav} onAtomDetail={handleAtomDetail}/>}
        {view === 'atoms'      && <AtomListScreen onAtomDetail={handleAtomDetail}/>}
        {view === 'atom-detail'&& <AtomDetailScreen atom={selectedAtom} onBack={popView}/>}
        {view === 'report'     && <ReportScreen onAtomDetail={handleAtomDetail} setToast={setToast}/>}
        {view === 'history'    && <HistoryScreen/>}
      </div>

      {showNav && <BottomNav active={rootView} onNav={handleNav} hasActive={true} atomCount={ATOMS.length}/>}

      {toast && <Toast msg={toast} onDone={() => setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
